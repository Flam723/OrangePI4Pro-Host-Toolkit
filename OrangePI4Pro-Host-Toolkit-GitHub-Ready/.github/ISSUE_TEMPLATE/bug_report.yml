name: Bug report
description: Report a reproducible toolkit problem
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Include toolkit version, kernel, boot layout, and hardware.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Diagnostic output
      description: Paste sanitized status, doctor, and relevant logs.
      render: shell
